<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS.1 // Operator System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ops: {
                            bg: "rgb(var(--ops-bg) / <alpha-value>)",
                            surface: "rgb(var(--ops-surface) / <alpha-value>)",
                            border: "rgb(var(--ops-border) / <alpha-value>)",
                            light: "rgb(var(--ops-light) / <alpha-value>)",
                            text: "rgb(var(--ops-text) / <alpha-value>)",
                            accent: "rgb(var(--ops-accent) / <alpha-value>)",
                            success: "rgb(var(--ops-success) / <alpha-value>)",
                            warning: "rgb(var(--ops-warning) / <alpha-value>)",
                            danger: "rgb(var(--ops-danger) / <alpha-value>)",
                        }
                    },
                    fontFamily: {
                        mono: ["JetBrains Mono", "monospace"],
                        sans: ["Inter", "sans-serif"],
                    },
                    fontSize: {
                        "xxs": "0.65rem"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Dark (default) Black & Red Glass */
            --ops-bg: 0 0 0;
            --ops-surface: 14 6 6;
            --ops-border: 50 15 15; /* Subtly red glass borders */
            --ops-light: 228 228 231;
            --ops-text: 244 244 245;
            --ops-accent: 220 38 38; /* Red-600 */
            --ops-success: 16 185 129;
            --ops-warning: 245 158 11;
            --ops-danger: 185 28 28; /* Red-700 */

            --ops-scroll-thumb: 60 20 20;
            --ops-scroll-thumb-hover: 100 30 30;
        }

        body {
            /* A deep, space-like mesh background that looks amazing under glass */
            background-color: #070000;
            background-image: 
                radial-gradient(at 10% 10%, rgba(220, 38, 38, 0.25) 0%, transparent 40%),
                radial-gradient(at 90% 90%, rgba(185, 28, 28, 0.2) 0%, transparent 40%),
                radial-gradient(at 80% 20%, rgba(153, 27, 27, 0.15) 0%, transparent 35%),
                radial-gradient(at 20% 80%, rgba(239, 68, 68, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: #f4f4f5;
        }

        html {
            background-color: #000000;
        }

        html[data-theme="light"] {
            /* Light (zinc palette) */
            --ops-bg: 250 250 250;
            --ops-surface: 255 255 255;
            --ops-border: 212 212 216;
            --ops-light: 63 63 70;
            --ops-text: 0 0 0;

            --ops-scroll-thumb: 161 161 170;
            --ops-scroll-thumb-hover: 113 113 122;
        }

        /* Light theme overrides for commonly-used Zinc utility classes.
           This avoids a massive class refactor while making the UI readable. */
        html[data-theme="light"] .bg-zinc-950 { background-color: rgb(250 250 250) !important; }
        html[data-theme="light"] .bg-zinc-900 { background-color: rgb(255 255 255) !important; }
        html[data-theme="light"] .bg-zinc-800 { background-color: rgb(244 244 245) !important; }

        html[data-theme="light"] .bg-zinc-950\/40 { background-color: rgb(244 244 245 / 0.6) !important; }
        html[data-theme="light"] .bg-zinc-950\/60 { background-color: rgb(244 244 245 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-900\/30 { background-color: rgb(255 255 255 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-900\/50 { background-color: rgb(255 255 255 / 0.9) !important; }
        html[data-theme="light"] .bg-zinc-800\/40 { background-color: rgb(244 244 245 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-800\/50 { background-color: rgb(244 244 245 / 0.9) !important; }

        html[data-theme="light"] .border-zinc-800 { border-color: rgb(212 212 216) !important; }
        html[data-theme="light"] .border-zinc-700 { border-color: rgb(161 161 170) !important; }
        html[data-theme="light"] .border-zinc-800\/50 { border-color: rgb(212 212 216 / 0.7) !important; }
        html[data-theme="light"] .border-white\/20 { border-color: rgb(0 0 0 / 0.25) !important; }
        html[data-theme="light"] .border-white\/10 { border-color: rgb(0 0 0 / 0.15) !important; }
        html[data-theme="light"] .border-white\/5 { border-color: rgb(0 0 0 / 0.08) !important; }
        html[data-theme="light"] .bg-white\/10 { background-color: rgb(0 0 0 / 0.08) !important; }
        html[data-theme="light"] .bg-white\/5 { background-color: rgb(0 0 0 / 0.04) !important; }

        html[data-theme="light"] .text-white { color: rgb(0 0 0) !important; font-weight: 600; }
        html[data-theme="light"] .text-zinc-200 { color: rgb(9 9 11) !important; font-weight: 500; }
        html[data-theme="light"] .text-zinc-300 { color: rgb(24 24 27) !important; font-weight: 500; }
        html[data-theme="light"] .text-zinc-400 { color: rgb(39 39 42) !important; font-weight: 500; }
        html[data-theme="light"] .text-zinc-500 { color: rgb(63 63 70) !important; }
        html[data-theme="light"] .text-zinc-600 { color: rgb(82 82 91) !important; }

        body {
            background-color: rgb(var(--ops-bg));
            color: rgb(var(--ops-text));
            position: relative;
            background-image: 
                radial-gradient(at 10% 10%, rgb(var(--ops-accent) / 0.25) 0%, transparent 40%),
                radial-gradient(at 90% 90%, rgb(var(--ops-danger) / 0.2) 0%, transparent 40%),
                radial-gradient(at 80% 20%, rgb(220 38 38 / 0.15) 0%, transparent 35%),
                radial-gradient(at 20% 80%, rgb(185 28 28 / 0.15) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Subtle ambient background glow (uses existing theme tokens only) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(900px 520px at 18% 10%, rgb(var(--ops-accent) / 0.18), transparent 60%),
                radial-gradient(820px 520px at 85% 18%, rgb(var(--ops-danger) / 0.15), transparent 58%),
                radial-gradient(980px 620px at 55% 100%, rgb(var(--ops-accent) / 0.12), transparent 62%);
            filter: saturate(160%);
        }

        /* Ensure app UI stays above glow */
        #command-bar,
        #workspace-main,
        #neural-drawer {
            position: relative;
            z-index: 1;
        }

        /* Refined Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(var(--ops-scroll-thumb)); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--ops-scroll-thumb-hover)); }

        /* Utility */
        .glass {
            background-color: rgb(var(--ops-surface) / 0.42);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
        }

        :root {
            --ops-glass-blur: 16px;
            --ops-glass-sat: 165%;
            --ops-glass-bg: 0.34;
            --ops-glass-border: 0.65;
            --ops-glass-inset: 0.06;
        }

        .glass-panel {
            background: linear-gradient(
                135deg,
                rgb(var(--ops-surface) / calc(var(--ops-glass-bg) + 0.08)),
                rgb(var(--ops-bg) / calc(var(--ops-glass-bg) - 0.10))
            );
            border: 1px solid rgb(var(--ops-border) / var(--ops-glass-border));
            box-shadow:
                0 1px 0 rgb(var(--ops-text) / var(--ops-glass-inset)) inset,
                0 10px 30px rgb(0 0 0 / 0.18);
            backdrop-filter: blur(var(--ops-glass-blur)) saturate(var(--ops-glass-sat));
            -webkit-backdrop-filter: blur(var(--ops-glass-blur)) saturate(var(--ops-glass-sat));
        }

        /* Command bar + header glass */
        #command-bar {
            background-color: rgb(var(--ops-surface) / 0.50) !important;
            backdrop-filter: blur(18px) saturate(165%);
            -webkit-backdrop-filter: blur(18px) saturate(165%);
        }
        #workspace-main > header {
            background-color: rgb(var(--ops-bg) / 0.55) !important;
            backdrop-filter: blur(18px) saturate(165%);
            -webkit-backdrop-filter: blur(18px) saturate(165%);
        }
        
        .nav-item {
            position: relative;
            transition: all 0.2s ease;
        }
        .nav-item::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 2px;
            background: rgb(var(--ops-accent));
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        .nav-item.active { background: rgb(var(--ops-surface)); color: rgb(var(--ops-text)); }
        .nav-item.active::before { transform: scaleY(1); }

        /* Transitions */
        .fade-enter { animation: fadeEnter 0.2s ease-out; }
        @keyframes fadeEnter { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .marty-orb {
            position: relative;
            width: 12px;
            height: 12px;
            border-radius: 9999px;
            background: rgb(96 165 250);
            box-shadow: 0 0 0 0 rgba(59,130,246,0.55);
            transition: transform 0.2s ease;
        }

        .marty-orb.idle {
            animation: martyIdle 2.4s ease-in-out infinite;
        }

        .marty-orb.busy {
            animation: martyBusy 0.9s ease-in-out infinite;
        }

        .marty-orb.responding {
            animation: martyRespond 0.55s ease-in-out infinite;
        }

        @keyframes martyIdle {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.45); }
            50% { transform: scale(1.08); box-shadow: 0 0 0 6px rgba(59,130,246,0.08); }
        }

        @keyframes martyBusy {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.6); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(59,130,246,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0); }
        }

        @keyframes martyRespond {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { transform: translateY(-1px); box-shadow: 0 0 0 6px rgba(34,197,94,0.08); }
        }

        #neural-drawer.marty-thinking {
            box-shadow: 0 0 0 1px rgba(59,130,246,0.35), 0 18px 50px rgba(2,6,23,0.45);
        }

        #neural-drawer.marty-responding {
            box-shadow: 0 0 0 1px rgba(16,185,129,0.35), 0 18px 50px rgba(2,6,23,0.45);
        }

        #neural-drawer {
            min-width: 280px;
            min-height: 260px;
        }

        #marty-resize-handle {
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 14px;
            height: 14px;
            cursor: nwse-resize;
            opacity: 0.7;
        }

        #marty-resize-handle::before {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 10px;
            height: 10px;
            border-right: 2px solid rgb(var(--ops-border));
            border-bottom: 2px solid rgb(var(--ops-border));
            border-radius: 1px;
        }

        body.marty-popout-mode {
            overflow: hidden;
        }

        body.marty-popout-mode #command-bar,
        body.marty-popout-mode #workspace-main {
            display: none !important;
        }

        body.marty-popout-mode #neural-drawer {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            min-width: 0 !important;
            min-height: 0 !important;
            border-radius: 0 !important;
            border: 0 !important;
        }

        body.marty-popout-mode #marty-drag-handle {
            cursor: default;
        }

        body.marty-popout-mode #marty-resize-handle {
            display: none;
        }

        /* ═══ Dashboard Card System ═══════════════════════════════════════ */
        .dash-card {
            border-radius: 0.75rem;
            background: linear-gradient(
                135deg,
                rgb(var(--ops-surface) / 0.42),
                rgb(var(--ops-bg) / 0.18)
            );
            border: 1px solid rgb(var(--ops-border) / 0.70);
            box-shadow:
                0 1px 0 rgb(var(--ops-text) / 0.06) inset,
                0 10px 28px rgb(0 0 0 / 0.18);
            backdrop-filter: blur(16px) saturate(165%);
            -webkit-backdrop-filter: blur(16px) saturate(165%);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        }
        .dash-card:hover {
            border-color: rgb(var(--ops-accent) / 0.28);
            box-shadow:
                0 1px 0 rgb(var(--ops-text) / 0.07) inset,
                0 0 0 1px rgb(var(--ops-accent) / 0.08),
                0 14px 34px rgb(0 0 0 / 0.22);
            transform: translateY(-1px);
        }
        .dash-card-head {
            cursor: pointer;
            user-select: none;
        }
        .dash-card-body {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, padding 0.25s ease;
            padding-top: 0;
        }
        .dash-card.expanded .dash-card-body {
            max-height: 800px;
            opacity: 1;
            padding-top: 0.5rem;
        }
        .dash-card .expand-chevron {
            transition: transform 0.25s ease;
            font-size: 9px;
            color: rgb(var(--ops-light) / 0.4);
        }
        .dash-card.expanded .expand-chevron {
            transform: rotate(180deg);
            color: rgb(var(--ops-accent));
        }

        /* MARTY Ambient Intelligence Bar */
        .marty-ambient {
            background: linear-gradient(135deg, rgb(59 130 246 / 0.06), rgb(16 185 129 / 0.04));
            border: 1px solid rgb(59 130 246 / 0.15);
            border-radius: 0.75rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .marty-ambient:hover {
            border-color: rgb(59 130 246 / 0.3);
            box-shadow: 0 0 20px rgb(59 130 246 / 0.08);
        }
        .marty-status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgb(59 130 246);
            animation: martyDotPulse 2.5s ease-in-out infinite;
        }
        @keyframes martyDotPulse {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 0 0 rgb(59 130 246 / 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 4px rgb(59 130 246 / 0); }
        }
        .marty-insight {
            padding: 6px 10px;
            border-radius: 6px;
            background: rgb(59 130 246 / 0.06);
            border-left: 2px solid rgb(59 130 246 / 0.3);
            font-size: 11px;
            color: rgb(var(--ops-text) / 0.8);
            transition: background 0.2s;
        }
        .marty-insight:hover {
            background: rgb(59 130 246 / 0.1);
        }

        /* Stat pill */
        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgb(var(--ops-border) / 0.75);
            background: rgb(var(--ops-surface) / 0.26);
            color: rgb(var(--ops-light));
            transition: all 0.2s;
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
        }
        .stat-pill:hover {
            color: white;
            border-color: rgb(var(--ops-accent) / 0.3);
        }

        /* MARTY drawer: glass + cleaner internal chrome */
        #neural-drawer {
            background-color: rgb(var(--ops-surface) / 0.55) !important;
            backdrop-filter: blur(18px) saturate(165%);
            -webkit-backdrop-filter: blur(18px) saturate(165%);
            box-shadow:
                0 1px 0 rgb(var(--ops-text) / 0.06) inset,
                0 22px 60px rgb(0 0 0 / 0.35);
        }
        #neural-drawer .bg-zinc-900,
        #neural-drawer .bg-zinc-900\/50 {
            background-color: rgb(var(--ops-surface) / 0.35) !important;
            backdrop-filter: blur(16px) saturate(165%);
            -webkit-backdrop-filter: blur(16px) saturate(165%);
        }

        /* Apply a glass treatment to the legacy zinc panels in main views (dark theme only). */
        html:not([data-theme="light"]) #main-port .bg-zinc-900\/30,
        html:not([data-theme="light"]) #main-port .bg-zinc-900\/20,
        html:not([data-theme="light"]) #main-port .bg-zinc-950\/20,
        html:not([data-theme="light"]) #main-port .bg-zinc-950\/40,
        html:not([data-theme="light"]) #main-port .bg-zinc-900\/50 {
            background-color: rgb(var(--ops-surface) / 0.25) !important;
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
        }
        html:not([data-theme="light"]) #main-port .border-zinc-800,
        html:not([data-theme="light"]) #main-port .border-zinc-700,
        html:not([data-theme="light"]) #main-port .border-zinc-800\/60,
        html:not([data-theme="light"]) #main-port .border-zinc-800\/50 {
            border-color: rgb(var(--ops-border) / 0.70) !important;
        }

        /* Responsive main layout */
        @media (max-width: 1024px) {
            #main-port {
                grid-template-columns: 1fr !important;
            }
            #marty-port {
                display: none !important;
            }
        }

        /* Smooth fade-in for dashboard items */
        .dash-stagger > * {
            animation: dashFadeUp 0.3s ease-out both;
        }
        .dash-stagger > *:nth-child(1) { animation-delay: 0ms; }
        .dash-stagger > *:nth-child(2) { animation-delay: 40ms; }
        .dash-stagger > *:nth-child(3) { animation-delay: 80ms; }
        .dash-stagger > *:nth-child(4) { animation-delay: 120ms; }
        .dash-stagger > *:nth-child(5) { animation-delay: 160ms; }
        .dash-stagger > *:nth-child(6) { animation-delay: 200ms; }
        .dash-stagger > *:nth-child(7) { animation-delay: 240ms; }
        .dash-stagger > *:nth-child(8) { animation-delay: 280ms; }
        .dash-stagger > *:nth-child(9) { animation-delay: 320ms; }
        .dash-stagger > *:nth-child(10) { animation-delay: 360ms; }
        @keyframes dashFadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex text-sm overflow-hidden antialiased selection:bg-red-500/30 selection:text-red-200">

    <!-- COMMAND BAR (Left) -->
    <aside id="command-bar" class="w-16 border-r border-ops-border flex flex-col items-center py-4 bg-ops-surface/60 backdrop-blur-2xl z-30 shadow-2xl">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-blue-400 mb-6 flex items-center justify-center font-mono font-bold text-white text-[10px] leading-none shadow-lg shadow-blue-500/20" title="OS.1 — Operator System 1">
            OS.1
        </div>

        <nav class="flex-1 w-full flex flex-col gap-2 px-2" id="primary-nav">
            <!-- Injected Icons -->
        </nav>

        <div class="mt-auto flex flex-col gap-4">
             <button id="server-status" class="w-2 h-2 rounded-full bg-red-500 mx-auto" title="Offline"></button>
        </div>
    </aside>

    <!-- CONTENT (Center) -->
    <main id="workspace-main" class="flex-1 flex flex-col min-w-0 bg-ops-bg/30 backdrop-blur-md relative z-10">
        <!-- Header -->
        <header class="h-12 border-b border-ops-border flex items-center justify-between px-6 bg-ops-bg/40 backdrop-blur-xl z-20">
            <div class="flex items-center gap-3">
                <h1 id="page-title" class="font-semibold text-white tracking-tight">Dashboard</h1>
                <span id="page-meta" class="text-xs text-ops-light px-2 py-0.5 rounded bg-ops-surface border border-ops-border hidden"></span>
            </div>
            <div class="flex items-center gap-3">
                <button id="sync-btn" class="text-ops-light hover:text-white transition-colors" title="Sync Data">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button id="toggle-theme" class="text-ops-light hover:text-white transition-colors" title="Toggle light/dark">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="h-4 w-px bg-ops-border"></div>
                <button id="toggle-chat" class="text-ops-accent hover:text-blue-400 transition-colors text-xs font-medium flex items-center gap-2">
                    <i class="fa-solid fa-bolt"></i> MARTY
                </button>
                <span id="marty-detached-indicator" class="hidden px-2 py-0.5 rounded border border-blue-600/40 bg-blue-600/10 text-blue-300 text-[10px] font-mono uppercase tracking-wider">Pop-out active</span>
            </div>
        </header>

        <!-- Viewport -->
        <div id="main-port" class="flex-1 overflow-y-auto p-0 scroll-smooth">
             <!-- Dynamic Content -->
        </div>
    </main>

    <!-- MARTY FLOATING PANEL -->
    <aside id="neural-drawer" class="fixed right-6 bottom-6 w-[22rem] h-[32rem] border border-white/10 rounded-2xl bg-ops-surface/50 backdrop-blur-2xl flex flex-col z-40 shadow-[0_8px_32px_rgba(0,0,0,0.5)] overflow-hidden transition-all duration-300">
        <div id="marty-drag-handle" class="p-2.5 border-b border-white/5 flex justify-between items-center bg-white/5 cursor-move select-none">
            <div class="flex items-center gap-2 min-w-0">
                <div id="marty-orb" class="marty-orb idle"></div>
                <span class="text-[11px] font-mono font-bold text-ops-light tracking-widest uppercase truncate">
                    <i class="fa-solid fa-microchip mr-1.5 text-ops-accent"></i>MARTY
                </span>
            </div>
            <div class="flex items-center gap-2">
                <button id="marty-popout-toggle" class="text-ops-light hover:text-white transition-colors text-[11px]" title="Detach MARTY">
                    <i class="fa-solid fa-up-right-from-square"></i>
                </button>
                <select id="marty-model-select" class="bg-ops-bg border border-ops-border rounded px-2 py-1 text-[10px] text-white font-mono focus:outline-none focus:ring-1 focus:ring-ops-accent">
                    <option value="gpt-5">GPT-5</option>
                    <option value="gpt-5-mini">GPT-5 Mini</option>
                    <option value="gpt-4.1">GPT-4.1</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                </select>
                <span id="ai-model-badge" class="px-1.5 py-0.5 rounded text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 font-mono">GPT-4o-Mini</span>
