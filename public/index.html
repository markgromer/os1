<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS.1 // Operator System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ops: {
                            bg: "rgb(var(--ops-bg) / <alpha-value>)",
                            surface: "rgb(var(--ops-surface) / <alpha-value>)",
                            border: "rgb(var(--ops-border) / <alpha-value>)",
                            light: "rgb(var(--ops-light) / <alpha-value>)",
                            text: "rgb(var(--ops-text) / <alpha-value>)",
                            accent: "rgb(var(--ops-accent) / <alpha-value>)",
                            success: "rgb(var(--ops-success) / <alpha-value>)",
                            warning: "rgb(var(--ops-warning) / <alpha-value>)",
                            danger: "rgb(var(--ops-danger) / <alpha-value>)",
                        }
                    },
                    fontFamily: {
                        mono: ["JetBrains Mono", "monospace"],
                        sans: ["Inter", "sans-serif"],
                    },
                    fontSize: {
                        "xxs": "0.65rem"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Dark (default) */
            --ops-bg: 9 9 11;
            --ops-surface: 24 24 27;
            --ops-border: 39 39 42;
            --ops-light: 161 161 170;
            --ops-text: 228 228 231;
            --ops-accent: 59 130 246;
            --ops-success: 16 185 129;
            --ops-warning: 245 158 11;
            --ops-danger: 239 68 68;

            --ops-scroll-thumb: 39 39 42;
            --ops-scroll-thumb-hover: 63 63 70;
        }

        html[data-theme="light"] {
            /* Light (zinc palette) */
            --ops-bg: 250 250 250;
            --ops-surface: 255 255 255;
            --ops-border: 228 228 231;
            --ops-light: 82 82 91;
            --ops-text: 24 24 27;

            --ops-scroll-thumb: 212 212 216;
            --ops-scroll-thumb-hover: 161 161 170;
        }

        /* Light theme overrides for commonly-used Zinc utility classes.
           This avoids a massive class refactor while making the UI readable. */
        html[data-theme="light"] .bg-zinc-950 { background-color: rgb(250 250 250) !important; }
        html[data-theme="light"] .bg-zinc-900 { background-color: rgb(255 255 255) !important; }
        html[data-theme="light"] .bg-zinc-800 { background-color: rgb(244 244 245) !important; }

        html[data-theme="light"] .bg-zinc-950\/40 { background-color: rgb(244 244 245 / 0.6) !important; }
        html[data-theme="light"] .bg-zinc-950\/60 { background-color: rgb(244 244 245 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-900\/30 { background-color: rgb(255 255 255 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-900\/50 { background-color: rgb(255 255 255 / 0.9) !important; }
        html[data-theme="light"] .bg-zinc-800\/40 { background-color: rgb(244 244 245 / 0.8) !important; }
        html[data-theme="light"] .bg-zinc-800\/50 { background-color: rgb(244 244 245 / 0.9) !important; }

        html[data-theme="light"] .border-zinc-800 { border-color: rgb(228 228 231) !important; }
        html[data-theme="light"] .border-zinc-700 { border-color: rgb(212 212 216) !important; }
        html[data-theme="light"] .border-zinc-800\/50 { border-color: rgb(228 228 231 / 0.7) !important; }

        html[data-theme="light"] .text-white { color: rgb(24 24 27) !important; }
        html[data-theme="light"] .text-zinc-200 { color: rgb(24 24 27) !important; }
        html[data-theme="light"] .text-zinc-300 { color: rgb(39 39 42) !important; }
        html[data-theme="light"] .text-zinc-400 { color: rgb(63 63 70) !important; }
        html[data-theme="light"] .text-zinc-500 { color: rgb(82 82 91) !important; }
        html[data-theme="light"] .text-zinc-600 { color: rgb(113 113 122) !important; }

        body {
            background-color: rgb(var(--ops-bg));
            color: rgb(var(--ops-text));
        }

        /* Refined Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(var(--ops-scroll-thumb)); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--ops-scroll-thumb-hover)); }

        /* Utility */
        .glass {
            background-color: rgb(var(--ops-surface) / 0.6);
            backdrop-filter: blur(8px);
        }
        
        .nav-item {
            position: relative;
            transition: all 0.2s ease;
        }
        .nav-item::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 2px;
            background: rgb(var(--ops-accent));
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        .nav-item.active { background: rgb(var(--ops-surface)); color: rgb(var(--ops-text)); }
        .nav-item.active::before { transform: scaleY(1); }

        /* Transitions */
        .fade-enter { animation: fadeEnter 0.2s ease-out; }
        @keyframes fadeEnter { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex text-sm overflow-hidden antialiased">
    
    <!-- COMMAND BAR (Left) -->
    <aside class="w-16 border-r border-ops-border flex flex-col items-center py-4 bg-ops-surface z-30">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-blue-400 mb-6 flex items-center justify-center font-mono font-bold text-white text-[10px] leading-none shadow-lg shadow-blue-500/20" title="OS.1 — Operator System 1">
            OS.1
        </div>

        <nav class="flex-1 w-full flex flex-col gap-2 px-2" id="primary-nav">
            <!-- Injected Icons -->
        </nav>

        <div class="mt-auto flex flex-col gap-4">
             <button id="server-status" class="w-2 h-2 rounded-full bg-red-500 mx-auto" title="Offline"></button>
        </div>
    </aside>

    <!-- CONTENT (Center) -->
    <main class="flex-1 flex flex-col min-w-0 bg-ops-bg relative">
        <!-- Header -->
        <header class="h-12 border-b border-ops-border flex items-center justify-between px-6 bg-ops-bg/80 backdrop-blur-sm z-20">
            <div class="flex items-center gap-3">
                <h1 id="page-title" class="font-semibold text-white tracking-tight">Dashboard</h1>
                <span id="page-meta" class="text-xs text-ops-light px-2 py-0.5 rounded bg-ops-surface border border-ops-border hidden"></span>
            </div>
            <div class="flex items-center gap-3">
                <button id="sync-btn" class="text-ops-light hover:text-white transition-colors" title="Sync Data">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button id="toggle-theme" class="text-ops-light hover:text-white transition-colors" title="Toggle light/dark">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="h-4 w-px bg-ops-border"></div>
                <button id="toggle-chat" class="text-ops-accent hover:text-blue-400 transition-colors text-xs font-medium flex items-center gap-2">
                    <i class="fa-solid fa-bolt"></i> NEURAL LINK
                </button>
            </div>
        </header>

        <!-- Viewport -->
        <div id="main-port" class="flex-1 overflow-y-auto p-0 scroll-smooth">
             <!-- Dynamic Content -->
        </div>
    </main>

    <!-- NEURAL DRAWER (Right) -->
    <aside id="neural-drawer" class="w-96 border-l border-ops-border bg-ops-surface flex flex-col z-30 transition-transform duration-300 transform translate-x-0 shadow-2xl">
        <div class="p-3 border-b border-ops-border flex justify-between items-center bg-zinc-900/50">
            <span class="text-xs font-mono font-bold text-ops-light tracking-widest uppercase">
                <i class="fa-solid fa-microchip mr-2 text-ops-accent"></i>Active Link
            </span>
            <span id="ai-model-badge" class="px-1.5 py-0.5 rounded text-[10px] bg-blue-500/10 text-blue-400 border border-blue-500/20 font-mono">GPT-4o-Mini</span>
        </div>

        <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-4 font-mono text-xs">
            <div class="text-center mt-10 opacity-30">
                <i class="fa-solid fa-terminal text-2xl mb-2"></i>
                <p>Ready for input.</p>
            </div>
        </div>

        <div class="p-3 border-t border-ops-border bg-zinc-900">
            <div class="relative">
                <textarea id="cmd-input" rows="1" 
                    class="w-full bg-ops-bg border border-ops-border rounded p-3 pr-10 text-white text-xs font-mono focus:border-ops-accent focus:outline-none focus:ring-1 focus:ring-ops-accent transition-all resize-none shadow-inner"
                    placeholder="Execute directive..."></textarea>
                <button id="cmd-send" class="absolute right-2 bottom-2 text-ops-light hover:text-white transition-colors p-1">
                    <i class="fa-solid fa-arrow-turn-up"></i>
                </button>
            </div>
            <div id="ai-status" class="flex justify-between mt-2 text-[10px] text-ops-light font-mono opacity-0 transition-opacity">
                <span>PROCESSING...</span>
                <span class="animate-pulse">///</span>
            </div>
        </div>
    </aside>

    <script src="app.js?v=ops2.6"></script>
</body>
</html>
