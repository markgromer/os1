<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.R.C.U.S. Live</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --border: rgba(59,130,246,0.15);
    --accent: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 12px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header .logo {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .header .status {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }
  .header .status.connected { color: var(--green); }
  .header .status.disconnected { color: var(--red); }
  .pulse {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  .pulse.off { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Context bar */
  .context-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(59,130,246,0.05);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    flex-shrink: 0;
  }
  .ctx-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .ctx-pill i { font-size: 8px; }
  .ctx-pill.active { color: var(--accent); border-color: rgba(59,130,246,0.3); }

  /* Feed */
  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .feed::-webkit-scrollbar { width: 4px; }
  .feed::-webkit-scrollbar-track { background: transparent; }
  .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    padding: 8px 10px;
    border-radius: 8px;
    max-width: 95%;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg.observation {
    background: rgba(59,130,246,0.08);
    border-left: 2px solid var(--accent);
    align-self: flex-start;
  }
  .msg.chat-marcus {
    background: rgba(59,130,246,0.08);
    border-left: 2px solid var(--accent);
    align-self: flex-start;
  }
  .msg.chat-user {
    background: rgba(34,197,94,0.08);
    border-left: 2px solid var(--green);
    align-self: flex-end;
  }
  .msg.thinking {
    color: var(--muted);
    font-style: italic;
    font-size: 10px;
    padding: 4px 10px;
    align-self: flex-start;
  }
  .msg.system {
    color: var(--muted);
    font-size: 10px;
    text-align: center;
    align-self: center;
    padding: 4px 8px;
  }
  .msg .meta {
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .msg .meta .tag {
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Chat input */
  .chat-bar {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .chat-bar input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  .chat-bar input:focus { border-color: var(--accent); }
  .chat-bar input::placeholder { color: var(--muted); }
  .chat-bar button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    color: white;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: opacity 0.2s;
  }
  .chat-bar button:hover { opacity: 0.85; }
  .chat-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* System health panel */
  .health-panel {
    display: none;
    padding: 8px 12px;
    background: rgba(17,24,39,0.8);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .health-panel.visible { display: block; }
  .health-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: inherit;
    font-size: 9px;
    padding: 2px 8px;
    cursor: pointer;
    margin-left: 8px;
    transition: color 0.2s, border-color 0.2s;
  }
  .health-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .health-toggle.active { color: var(--accent); border-color: rgba(59,130,246,0.4); }
  .health-toggle.alert { color: var(--red); border-color: rgba(239,68,68,0.4); animation: pulse 2s infinite; }

  .health-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px;
    margin-bottom: 6px;
  }
  .health-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
  }
  .health-card .hc-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .health-card .hc-value {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
  }
  .health-card .hc-detail {
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }
  .hc-ok { color: var(--green); }
  .hc-warn { color: var(--amber); }
  .hc-crit { color: var(--red); }

  .health-bar {
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    margin-top: 4px;
    overflow: hidden;
  }
  .health-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background 0.3s;
  }

  .health-alerts {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .health-alert-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 600;
  }
  .health-alert-pill.danger {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }
  .health-alert-pill.warning {
    background: rgba(245,158,11,0.12);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.3);
  }
  .health-alert-pill.ok {
    background: rgba(34,197,94,0.1);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
  }

  /* Responsive */
  @media (max-width: 400px) {
    .context-bar { font-size: 9px; }
    .msg { font-size: 11px; }
    .health-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo"><i class="fa-solid fa-brain"></i> M.A.R.C.U.S. LIVE</span>
  <span class="status disconnected" id="status"><span class="pulse off"></span>Connecting...</span>
</div>

<div class="context-bar" id="context-bar">
  <span class="ctx-pill" id="ctx-workspace"><i class="fa-solid fa-folder"></i> <span>No workspace</span></span>
  <span class="ctx-pill" id="ctx-branch"><i class="fa-solid fa-code-branch"></i> <span>-</span></span>
  <span class="ctx-pill" id="ctx-app"><i class="fa-solid fa-window-maximize"></i> <span>-</span></span>
  <span class="ctx-pill" id="ctx-files"><i class="fa-solid fa-file-pen"></i> <span>-</span></span>
  <button class="health-toggle" id="health-toggle" title="System Health"><i class="fa-solid fa-heartbeat"></i> SYS</button>
</div>

<div class="health-panel" id="health-panel">
  <div class="health-grid" id="health-grid">
    <div class="health-card" id="hc-cpu">
      <div class="hc-label"><i class="fa-solid fa-microchip"></i> CPU</div>
      <div class="hc-value">--</div>
      <div class="health-bar"><div class="health-bar-fill" id="hb-cpu"></div></div>
    </div>
    <div class="health-card" id="hc-ram">
      <div class="hc-label"><i class="fa-solid fa-memory"></i> RAM</div>
      <div class="hc-value">--</div>
      <div class="health-bar"><div class="health-bar-fill" id="hb-ram"></div></div>
    </div>
    <div class="health-card" id="hc-disk">
      <div class="hc-label"><i class="fa-solid fa-hard-drive"></i> DISK</div>
      <div class="hc-value">--</div>
      <div class="health-bar"><div class="health-bar-fill" id="hb-disk"></div></div>
    </div>
    <div class="health-card" id="hc-defender">
      <div class="hc-label"><i class="fa-solid fa-shield-halved"></i> DEFENDER</div>
      <div class="hc-value">--</div>
      <div class="hc-detail" id="hc-defender-detail"></div>
    </div>
    <div class="health-card" id="hc-uptime">
      <div class="hc-label"><i class="fa-solid fa-clock"></i> UPTIME</div>
      <div class="hc-value">--</div>
    </div>
  </div>
  <div class="health-alerts" id="health-alerts"></div>
</div>

<div class="feed" id="feed">
  <div class="msg system">Connecting to M.A.R.C.U.S. Live feed...</div>
</div>

<div class="chat-bar">
  <input type="text" id="chat-input" placeholder="Talk to Marcus about what you're working on..." autocomplete="off" />
  <button id="chat-send"><i class="fa-solid fa-paper-plane"></i> Send</button>
</div>

<script>
(function() {
  const feed = document.getElementById('feed');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const statusEl = document.getElementById('status');
  const ctxWorkspace = document.querySelector('#ctx-workspace span');
  const ctxBranch = document.querySelector('#ctx-branch span');
  const ctxApp = document.querySelector('#ctx-app span');
  const ctxFiles = document.querySelector('#ctx-files span');
  const healthToggle = document.getElementById('health-toggle');
  const healthPanel = document.getElementById('health-panel');

  // Health panel toggle
  healthToggle.addEventListener('click', () => {
    healthPanel.classList.toggle('visible');
    healthToggle.classList.toggle('active');
  });

  // Also fetch health on load
  (async function fetchInitialHealth() {
    try {
      const token = getToken();
      const headers = {};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const r = await fetch(BASE + '/api/desktop-context/health', { headers, credentials: 'include' });
      const d = await r.json();
      if (d.available && d.health) updateHealthUI(d.health);
    } catch {}
  })();

  // Get auth token from cookie
  function getToken() {
    const match = document.cookie.match(/(?:^|;\s*)ops_admin_token=([^;]*)/);
    return match ? decodeURIComponent(match[1]) : '';
  }

  // Determine base URL (same origin)
  const BASE = window.location.origin;

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function timeStr(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMsg(type, text, meta) {
    // Remove thinking indicator if present
    const thinking = feed.querySelector('.msg.thinking');
    if (thinking && type !== 'thinking') thinking.remove();

    const div = document.createElement('div');
    div.className = `msg ${type}`;

    let metaHtml = '';
    if (meta) {
      metaHtml = `<div class="meta">`;
      if (meta.tag) metaHtml += `<span class="tag">${esc(meta.tag)}</span>`;
      if (meta.time) metaHtml += `<span>${meta.time}</span>`;
      if (meta.workspace) metaHtml += `<span>in ${esc(meta.workspace)}</span>`;
      metaHtml += `</div>`;
    }

    div.innerHTML = metaHtml + esc(text);
    feed.appendChild(div);

    // Auto-scroll to bottom
    feed.scrollTop = feed.scrollHeight;
  }

  // SSE Connection
  let es = null;
  let reconnectTimer = null;

  function connect() {
    if (es) { try { es.close(); } catch {} }

    const token = getToken();
    const url = `${BASE}/api/marcus/live${token ? '?token=' + encodeURIComponent(token) : ''}`;
    es = new EventSource(url, { withCredentials: true });

    es.onopen = () => {
      statusEl.className = 'status connected';
      statusEl.innerHTML = '<span class="pulse"></span>Live';
      addMsg('system', 'Connected to M.A.R.C.U.S. Live');
    };

    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        handleEvent(data);
      } catch {}
    };

    es.onerror = () => {
      statusEl.className = 'status disconnected';
      statusEl.innerHTML = '<span class="pulse off"></span>Disconnected';
      try { es.close(); } catch {}
      // Reconnect after 5s
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 5000);
    };
  }

  function handleEvent(data) {
    switch (data.type) {
      case 'init':
        if (data.observations?.length) {
          for (const obs of data.observations) {
            addMsg('observation', obs.text, {
              tag: 'observation',
              time: timeStr(obs.ts),
              workspace: obs.workspace,
            });
          }
        }
        break;

      case 'context':
        if (data.workspace) {
          ctxWorkspace.textContent = data.workspace;
          document.getElementById('ctx-workspace').classList.add('active');
        }
        if (data.branch) {
          ctxBranch.textContent = data.branch;
          document.getElementById('ctx-branch').classList.add('active');
        }
        if (data.processName) {
          ctxApp.textContent = data.processName;
        }
        if (data.activeFile) {
          ctxFiles.textContent = data.activeFile + (data.fileCount ? ' +' + (data.fileCount - 1) : '');
          document.getElementById('ctx-files').classList.add('active');
        } else if (data.recentFiles?.length) {
          ctxFiles.textContent = data.recentFiles.length + ' files';
          document.getElementById('ctx-files').classList.add('active');
        }
        if (data.systemHealth) updateHealthUI(data.systemHealth);
        break;

      case 'observation':
        addMsg('observation', data.text, {
          tag: 'observation',
          time: timeStr(data.ts),
          workspace: data.workspace,
        });
        break;

      case 'chat':
        if (data.from === 'marcus') {
          addMsg('chat-marcus', data.text, { tag: 'marcus', time: timeStr(data.ts) });
        }
        break;

      case 'thinking':
        addMsg('thinking', 'Marcus is analyzing your workspace...');
        break;
    }
  }

  // Chat
  async function sendChat() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendBtn.disabled = true;

    addMsg('chat-user', msg, { tag: 'you', time: timeStr(Date.now()) });

    try {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const resp = await fetch(`${BASE}/api/marcus/live/chat`, {
        method: 'POST',
        headers,
        credentials: 'include',
        body: JSON.stringify({ message: msg }),
      });
      const data = await resp.json();
      if (data.ok && data.reply) {
        // Reply comes via SSE, but also show directly in case SSE is delayed
        addMsg('chat-marcus', data.reply, { tag: 'marcus', time: timeStr(Date.now()) });
      } else if (data.error) {
        addMsg('system', 'Error: ' + data.error);
      }
    } catch (err) {
      addMsg('system', 'Failed to send: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendChat);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });

  // System health UI updater
  function updateHealthUI(h) {
    // CPU
    const cpuCard = document.querySelector('#hc-cpu .hc-value');
    const cpuBar = document.getElementById('hb-cpu');
    const cpu = typeof h.cpu === 'number' ? h.cpu : (h.cpuPercent || 0);
    cpuCard.textContent = cpu + '%';
    cpuCard.className = 'hc-value ' + (cpu > 90 ? 'hc-crit' : cpu > 70 ? 'hc-warn' : 'hc-ok');
    cpuBar.style.width = cpu + '%';
    cpuBar.style.background = cpu > 90 ? 'var(--red)' : cpu > 70 ? 'var(--amber)' : 'var(--green)';

    // RAM
    const ramCard = document.querySelector('#hc-ram .hc-value');
    const ramBar = document.getElementById('hb-ram');
    const ram = typeof h.ram === 'number' ? h.ram : (h.memoryPercent || 0);
    const ramUsed = h.ramUsed || h.memoryUsedGB || 0;
    const ramTotal = h.ramTotal || h.memoryTotalGB || 0;
    ramCard.textContent = ram + '%';
    ramCard.className = 'hc-value ' + (ram > 90 ? 'hc-crit' : ram > 80 ? 'hc-warn' : 'hc-ok');
    ramBar.style.width = ram + '%';
    ramBar.style.background = ram > 90 ? 'var(--red)' : ram > 80 ? 'var(--amber)' : 'var(--green)';
    const ramDetail = document.querySelector('#hc-ram');
    let existingDetail = ramDetail.querySelector('.hc-detail');
    if (!existingDetail) { existingDetail = document.createElement('div'); existingDetail.className = 'hc-detail'; ramDetail.appendChild(existingDetail); }
    existingDetail.textContent = ramUsed + ' / ' + ramTotal + ' GB';

    // Disk (first/primary drive)
    const diskCard = document.querySelector('#hc-disk .hc-value');
    const diskBar = document.getElementById('hb-disk');
    const disks = h.disks || [];
    if (disks.length) {
      const d = disks[0];
      const pct = d.usedPercent || 0;
      diskCard.textContent = pct + '%';
      diskCard.className = 'hc-value ' + (pct > 90 ? 'hc-crit' : pct > 80 ? 'hc-warn' : 'hc-ok');
      diskBar.style.width = pct + '%';
      diskBar.style.background = pct > 90 ? 'var(--red)' : pct > 80 ? 'var(--amber)' : 'var(--green)';
      const diskDet = document.querySelector('#hc-disk');
      let dd = diskDet.querySelector('.hc-detail');
      if (!dd) { dd = document.createElement('div'); dd.className = 'hc-detail'; diskDet.appendChild(dd); }
      dd.textContent = (d.drive || 'C:') + ' ' + d.freeGB + ' GB free';
    }

    // Defender
    const defCard = document.querySelector('#hc-defender .hc-value');
    const defDetail = document.getElementById('hc-defender-detail');
    const defOk = h.defenderOk !== undefined ? h.defenderOk : (h.defender?.enabled && h.defender?.realTimeProtection);
    if (defOk) {
      defCard.textContent = 'Protected';
      defCard.className = 'hc-value hc-ok';
      defDetail.textContent = 'Real-time protection active';
    } else {
      defCard.textContent = 'At Risk';
      defCard.className = 'hc-value hc-crit';
      defDetail.textContent = 'Protection disabled or outdated';
    }

    // Uptime
    const uptimeCard = document.querySelector('#hc-uptime .hc-value');
    const upH = h.uptime || h.uptimeHours || 0;
    if (upH >= 24) {
      const days = Math.floor(upH / 24);
      const hrs = Math.round(upH % 24);
      uptimeCard.textContent = days + 'd ' + hrs + 'h';
      uptimeCard.className = 'hc-value ' + (upH > 168 ? 'hc-warn' : '');
    } else {
      uptimeCard.textContent = Math.round(upH) + 'h';
      uptimeCard.className = 'hc-value';
    }

    // Alerts bar
    const alertsEl = document.getElementById('health-alerts');
    const alerts = [];
    const threats = h.threats || h.recentThreats?.length || 0;
    const logins = h.failedLogins?.length || h.failedLogins || 0;
    if (threats > 0) alerts.push({ text: threats + ' threat(s) detected', cls: 'danger', icon: 'fa-bug' });
    if (typeof logins === 'number' && logins > 0) alerts.push({ text: logins + ' failed login(s)', cls: 'danger', icon: 'fa-user-xmark' });
    if (!defOk) alerts.push({ text: 'Defender issue', cls: 'danger', icon: 'fa-shield-halved' });
    if (cpu > 90) alerts.push({ text: 'High CPU', cls: 'warning', icon: 'fa-fire' });
    if (ram > 90) alerts.push({ text: 'High RAM', cls: 'warning', icon: 'fa-memory' });
    if (disks.length && disks[0].usedPercent > 90) alerts.push({ text: 'Low disk space', cls: 'warning', icon: 'fa-hard-drive' });
    if (upH > 168) alerts.push({ text: 'Reboot recommended', cls: 'warning', icon: 'fa-rotate-right' });
    if (alerts.length === 0) alerts.push({ text: 'All systems nominal', cls: 'ok', icon: 'fa-check-circle' });

    alertsEl.innerHTML = alerts.map(a =>
      `<span class="health-alert-pill ${a.cls}"><i class="fa-solid ${a.icon}"></i> ${esc(a.text)}</span>`
    ).join('');

    // Update toggle button color based on alerts
    const hasCrit = alerts.some(a => a.cls === 'danger');
    healthToggle.classList.toggle('alert', hasCrit);
  }

  // Initial connect
  connect();
  input.focus();
})();
</script>
</body>
</html>
